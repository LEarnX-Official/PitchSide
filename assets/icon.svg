<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono',ui-monospace,monospace">
  <defs>
    <linearGradient id="mint2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3df0b0"/>
      <stop offset="1" stop-color="#1b8b66"/>
    </linearGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#2ee6a6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#2ee6a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded terminal tile -->
  <rect width="256" height="256" rx="52" fill="#07090c"/>
  <rect x="20" y="20" width="216" height="216" rx="40" fill="#0c1015" stroke="#1c2530" stroke-width="2"/>
  <ellipse cx="128" cy="120" rx="120" ry="110" fill="url(#glow2)"/>

  <!-- traffic-light dots -->
  <circle cx="52" cy="52" r="7" fill="#ff5f57"/>
  <circle cx="76" cy="52" r="7" fill="#febc2e"/>
  <circle cx="100" cy="52" r="7" fill="#2ee6a6"/>

  <!-- phosphor football -->
  <g transform="translate(128,138)">
    <circle r="56" fill="#0a0e12" stroke="url(#mint2)" stroke-width="4"/>
    <polygon points="0,-20 19,-6 12,15 -12,15 -19,-6" fill="#2ee6a6"/>
    <g stroke="#2ee6a6" stroke-width="3.5" stroke-linecap="round">
      <line x1="0" y1="-20" x2="0" y2="-48"/>
      <line x1="19" y1="-6" x2="45" y2="-22"/>
      <line x1="12" y1="15" x2="30" y2="40"/>
      <line x1="-12" y1="15" x2="-30" y2="40"/>
      <line x1="-19" y1="-6" x2="-45" y2="-22"/>
    </g>
  </g>

  <!-- prompt mark -->
  <text x="128" y="222" text-anchor="middle" font-size="26" font-weight="700">
    <tspan fill="#2ee6a6">▸</tspan><tspan fill="#d6e2e0"> PS</tspan>
  </text>
</svg>
