<svg width="720" height="240" viewBox="0 0 720 240" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace">
  <defs>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3df0b0"/>
      <stop offset="1" stop-color="#1b8b66"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0" stop-color="#2ee6a6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#2ee6a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop glow -->
  <rect width="720" height="240" rx="20" fill="#07090c"/>
  <ellipse cx="330" cy="110" rx="360" ry="180" fill="url(#glow)"/>

  <!-- terminal window frame -->
  <rect x="28" y="34" width="664" height="172" rx="14" fill="#0c1015" stroke="#1c2530" stroke-width="1.5"/>
  <!-- title bar rule -->
  <line x1="28" y1="72" x2="692" y2="72" stroke="#1c2530" stroke-width="1.5"/>
  <!-- traffic-light dots -->
  <circle cx="52" cy="53" r="6" fill="#ff5f57"/>
  <circle cx="74" cy="53" r="6" fill="#febc2e"/>
  <circle cx="96" cy="53" r="6" fill="#2ee6a6"/>
  <text x="120" y="58" fill="#6d7d84" font-size="13" letter-spacing="1">pitchside — offline · p2p · on-device AI</text>

  <!-- phosphor football (pentagon-hinted) -->
  <g transform="translate(112,142)" filter="url(#soft)">
    <circle r="34" fill="#0a0e12" stroke="url(#mint)" stroke-width="2.5"/>
    <!-- classic ball panels, mint on dark -->
    <polygon points="0,-12 11,-4 7,9 -7,9 -11,-4" fill="#2ee6a6"/>
    <g stroke="#2ee6a6" stroke-width="2" stroke-linecap="round">
      <line x1="0" y1="-12" x2="0" y2="-30"/>
      <line x1="11" y1="-4" x2="27" y2="-14"/>
      <line x1="7" y1="9" x2="18" y2="24"/>
      <line x1="-7" y1="9" x2="-18" y2="24"/>
      <line x1="-11" y1="-4" x2="-27" y2="-14"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="168" y="140" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#2ee6a6">▸ </tspan><tspan fill="#d6e2e0">pitch</tspan><tspan fill="#2ee6a6">side</tspan>
  </text>

  <!-- blinking cursor block -->
  <rect x="516" y="106" width="20" height="40" fill="#2ee6a6">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- three-track tagline -->
  <text x="170" y="176" font-size="15" letter-spacing="0.5">
    <tspan fill="#2ee6a6">Pears</tspan><tspan fill="#6d7d84"> P2P  ·  </tspan><tspan fill="#7cc0ff">QVAC</tspan><tspan fill="#6d7d84"> Local AI  ·  </tspan><tspan fill="#ffcf5c">WDK</tspan><tspan fill="#6d7d84"> Wallets</tspan>
  </text>
</svg>
